services:
  postgres:
    image: postgres:17-alpine
    container_name: mfos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mfos-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      RUN_MIGRATIONS: "true"
      RUN_SEED: "true"
    ports:
      - "${PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: